<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Agentic AI Platform — Test Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root{
    --bg:#0f1220; --panel:#171a2b; --border:#2a2f4a; --accent:#7c9cff;
    --text:#e8eaf6; --muted:#9aa0c3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--text); padding:32px;
  }
  h1{font-size:22px;margin-bottom:4px;}
  p.sub{color:var(--muted); margin-top:0; margin-bottom:24px;}
  .tabs{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .tab{
    padding:8px 14px; border:1px solid var(--border); border-radius:8px;
    cursor:pointer; background:var(--panel); font-size:13px;
  }
  .tab.active{background:var(--accent); color:#0f1220; border-color:var(--accent);}
  .panel{display:none; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:20px; max-width:800px;}
  .panel.active{display:block;}
  label{display:block; font-size:12px; color:var(--muted); margin:12px 0 4px;}
  input, textarea{
    width:100%; padding:10px; border-radius:8px; border:1px solid var(--border);
    background:#0f1220; color:var(--text); font-family:inherit; font-size:13px;
  }
  textarea{min-height:120px; resize:vertical;}
  button{
    margin-top:16px; padding:10px 18px; border:none; border-radius:8px;
    background:var(--accent); color:#0f1220; font-weight:600; cursor:pointer;
  }
  pre{
    background:#0a0c17; padding:14px; border-radius:8px; overflow:auto;
    max-height:400px; font-size:12px; margin-top:16px; white-space:pre-wrap;
  }
</style>
</head>
<body>
  <h1>🤖 Agentic AI Platform</h1>
  <p class="sub">Test console for the 5 Gemini-powered agents. Backend: Node.js + Express.</p>

  <div class="tabs">
    <div class="tab active" data-tab="resume">1. Resume Analyzer</div>
    <div class="tab" data-tab="match">2. Job Matching</div>
    <div class="tab" data-tab="cover">3. Cover Letter</div>
    <div class="tab" data-tab="interview">4. Interview Prep</div>
    <div class="tab" data-tab="chat">5. Career Chatbot</div>
    <div class="tab" data-tab="whatsapp">📲 WhatsApp Notify</div>
  </div>

  <div class="panel active" id="resume">
    <label>Resume Text</label>
    <textarea id="resume_text" placeholder="Paste resume text here..."></textarea>
    <label><input type="checkbox" id="resume_notify" style="width:auto;display:inline-block;vertical-align:middle;"> Notify me on WhatsApp</label>
    <input id="resume_phone" placeholder="WhatsApp number, e.g. +919876543210" />
    <button onclick="callAgent('resume')">Analyze Resume</button>
    <pre id="resume_out"></pre>
  </div>

  <div class="panel" id="match">
    <label>Resume Text</label>
    <textarea id="match_resume" placeholder="Paste resume text..."></textarea>
    <label>Job Description</label>
    <textarea id="match_jd" placeholder="Paste job description..."></textarea>
    <label><input type="checkbox" id="match_notify" style="width:auto;display:inline-block;vertical-align:middle;"> Notify me on WhatsApp</label>
    <input id="match_phone" placeholder="WhatsApp number, e.g. +919876543210" />
    <button onclick="callAgent('match')">Match Job</button>
    <pre id="match_out"></pre>
  </div>

  <div class="panel" id="cover">
    <label>Company Name</label>
    <input id="cover_company" placeholder="e.g. Google" />
    <label>Job Title</label>
    <input id="cover_title" placeholder="e.g. Frontend Engineer" />
    <label>Resume Text</label>
    <textarea id="cover_resume" placeholder="Paste resume text..."></textarea>
    <label><input type="checkbox" id="cover_notify" style="width:auto;display:inline-block;vertical-align:middle;"> Notify me on WhatsApp</label>
    <input id="cover_phone" placeholder="WhatsApp number, e.g. +919876543210" />
    <button onclick="callAgent('cover')">Generate Cover Letter</button>
    <pre id="cover_out"></pre>
  </div>

  <div class="panel" id="interview">
    <label>Job Title</label>
    <input id="interview_title" placeholder="e.g. Backend Developer" />
    <label><input type="checkbox" id="interview_notify" style="width:auto;display:inline-block;vertical-align:middle;"> Notify me on WhatsApp</label>
    <input id="interview_phone" placeholder="WhatsApp number, e.g. +919876543210" />
    <button onclick="callAgent('interview')">Generate Questions</button>
    <pre id="interview_out"></pre>
  </div>

  <div class="panel" id="chat">
    <label>Ask CareerBot</label>
    <input id="chat_message" placeholder="e.g. Explain Docker." />
    <label><input type="checkbox" id="chat_notify" style="width:auto;display:inline-block;vertical-align:middle;"> Notify me on WhatsApp</label>
    <input id="chat_phone" placeholder="WhatsApp number, e.g. +919876543210" />
    <button onclick="callAgent('chat')">Send</button>
    <pre id="chat_out"></pre>
  </div>

  <div class="panel" id="whatsapp">
    <label>Recipient WhatsApp Number</label>
    <input id="wa_phone" placeholder="+919876543210" />
    <label>Message</label>
    <textarea id="wa_message" placeholder="Custom notification text..."></textarea>
    <button onclick="callAgent('whatsapp')">Send WhatsApp Message</button>
    <pre id="whatsapp_out"></pre>
  </div>

<script>
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

async function post(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function callAgent(type) {
  try {
    let out, result;
    if (type === 'resume') {
      out = document.getElementById('resume_out');
      out.textContent = 'Loading...';
      result = await post('/api/agents/resume-analyzer', {
        resumeText: document.getElementById('resume_text').value,
        notifyWhatsApp: document.getElementById('resume_notify').checked,
        phoneNumber: document.getElementById('resume_phone').value
      });
    } else if (type === 'match') {
      out = document.getElementById('match_out');
      out.textContent = 'Loading...';
      result = await post('/api/agents/job-matching', {
        resumeText: document.getElementById('match_resume').value,
        jobDescription: document.getElementById('match_jd').value,
        notifyWhatsApp: document.getElementById('match_notify').checked,
        phoneNumber: document.getElementById('match_phone').value
      });
    } else if (type === 'cover') {
      out = document.getElementById('cover_out');
      out.textContent = 'Loading...';
      result = await post('/api/agents/cover-letter', {
        companyName: document.getElementById('cover_company').value,
        jobTitle: document.getElementById('cover_title').value,
        resumeText: document.getElementById('cover_resume').value,
        notifyWhatsApp: document.getElementById('cover_notify').checked,
        phoneNumber: document.getElementById('cover_phone').value
      });
    } else if (type === 'interview') {
      out = document.getElementById('interview_out');
      out.textContent = 'Loading...';
      result = await post('/api/agents/interview-prep', {
        jobTitle: document.getElementById('interview_title').value,
        notifyWhatsApp: document.getElementById('interview_notify').checked,
        phoneNumber: document.getElementById('interview_phone').value
      });
    } else if (type === 'chat') {
      out = document.getElementById('chat_out');
      out.textContent = 'Loading...';
      result = await post('/api/agents/career-chatbot', {
        message: document.getElementById('chat_message').value,
        sessionId: 'browser-test',
        notifyWhatsApp: document.getElementById('chat_notify').checked,
        phoneNumber: document.getElementById('chat_phone').value
      });
    } else if (type === 'whatsapp') {
      out = document.getElementById('whatsapp_out');
      out.textContent = 'Loading...';
      result = await post('/api/notify/whatsapp', {
        phoneNumber: document.getElementById('wa_phone').value,
        message: document.getElementById('wa_message').value
      });
    }
    out.textContent = JSON.stringify(result, null, 2);
  } catch (e) {
    console.error(e);
  }
}
</script>
</body>
</html>
